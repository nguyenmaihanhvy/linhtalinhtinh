<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanhVy | linhtalinhtinh</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CSS VARIABLES - Hệ thống quản lý màu sắc */
        :root {
            --background: #002b42; /* Deep Navy Blue */
            --foreground: #ffffff;
            --muted-foreground: #a1a1aa;
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --liquid-bg: rgba(255, 255, 255, 0.01);
        }

        /* 2. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 3. VIDEO BACKGROUND */
        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-cover: cover;
            object-fit: cover;
        }

        /* 4. NAVIGATION */
        nav {
            position: relative;
            z-index: 10;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.875rem;
            letter-spacing: -0.02em;
        }

        .logo sup {
            font-size: 0.75rem;
            margin-left: 2px;
        }

        .nav-links {
            display: none;
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex;
                gap: 2.5rem;
            }
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.875rem;
            color: var(--muted-foreground);
            transition: color 0.3s ease;
        }

        .nav-links a.active, .nav-links a:hover {
            color: var(--foreground);
        }

        /* 5. LIQUID GLASS EFFECT (Kỹ thuật cao cấp) */
        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            position: relative;
            cursor: pointer;
            color: var(--foreground);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.45) 0%, 
                rgba(255,255,255,0.1) 40%, 
                rgba(255,255,255,0.1) 60%, 
                rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        .btn-nav {
            padding: 0.6rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        .btn-hero {
            padding: 1.25rem 3.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            margin-top: 3rem;
        }

        .liquid-glass:hover {
            transform: scale(1.03);
        }

        /* 6. HERO SECTION */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 1.5rem 10rem;
            min-height: calc(100vh - 100px);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            letter-spacing: -2.46px;
            font-weight: 400;
            max-width: 1200px;
        }

        h1 em {
            font-style: normal;
            color: var(--muted-foreground);
        }

        .subtext {
            color: var(--muted-foreground);
            font-size: clamp(1rem, 2vw, 1.125rem);
            max-width: 42rem;
            margin-top: 2rem;
            line-height: 1.6;
        }

        /* 7. ANIMATIONS */
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-1 { animation: fadeRise 0.8s ease-out forwards; }
        .animate-2 { animation: fadeRise 0.8s ease-out 0.2s both; }
        .animate-3 { animation: fadeRise 0.8s ease-out 0.4s both; }

    </style>
</head>
<body>

    <!-- Background Video -->
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="logo">Velorah<sup>®</sup></div>
        
        <div class="nav-links">
            <a href="#" class="active"></a>
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
        </div>

        <div class="liquid-glass btn-nav">Begin Journey</div>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <h1 class="animate-1">
            everything <em>happens</em> for <br>
            <em>a reason.</em>
        </h1>

        <div class="liquid-glass btn-hero animate-3">
            Begin Journey
        </div>
    </main>

</body>
</html>
