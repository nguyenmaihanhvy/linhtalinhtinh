<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HanhVy | linhtalinhtinh</title>
    
    <!-- Google Fonts hỗ trợ Tiếng Việt đầy đủ -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CSS VARIABLES */
        :root {
            --background: #002b42; 
            --foreground: #ffffff;
            --muted-foreground: rgba(255, 255, 255, 0.7);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Be Vietnam Pro', sans-serif;
            --liquid-bg: rgba(255, 255, 255, 0.01);
            --gold-glow: rgba(255, 215, 0, 0.6);
            --gold-solid: #ffd700;
            --easing: cubic-bezier(0.23, 1, 0.32, 1);
            --easing-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html, body {
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            height: 100%;
            background-color: var(--background);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--foreground);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. VIDEO BACKGROUND */
        .video-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* 3. NAVIGATION */
        nav {
            position: relative;
            z-index: 50;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.875rem;
            letter-spacing: -0.02em;
        }

        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            cursor: pointer;
            color: var(--foreground);
            transition: transform 0.4s var(--easing-elastic);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            min-height: 44px;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        .btn-nav { padding: 0.6rem 1.5rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; }

        /* 4. HERO SECTION */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
            height: 100vh;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            letter-spacing: -2.46px;
            font-weight: 400;
        }

        h1 em {
            font-style: italic;
            color: white;
            text-shadow: 0 0 10px var(--gold-glow), 0 0 25px rgba(255, 215, 0, 0.3);
        }

        /* 5. FIREFLIES */
        .bubbles-container {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }

        .firefly {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at center, #fff 0%, var(--gold-glow) 50%, transparent 80%);
            filter: blur(1.5px); 
            box-shadow: 0 0 15px var(--gold-glow);
            pointer-events: auto;
            cursor: pointer;
            will-change: transform, opacity;
        }

        @keyframes fireflyFloat {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate3d(-10px, -20px, 0) scale(1.1); opacity: 1; }
        }

        .f-1 { width: 15px; height: 15px; top: 15%; left: 15%; animation: fireflyFloat 6s infinite ease-in-out; }
        .f-2 { width: 22px; height: 22px; top: 65%; left: 25%; animation: fireflyFloat 8s infinite ease-in-out 1s; }
        .f-3 { width: 12px; height: 12px; top: 30%; left: 75%; animation: fireflyFloat 7s infinite ease-in-out 2s; }
        .f-4 { width: 18px; height: 18px; top: 75%; left: 80%; animation: fireflyFloat 9s infinite ease-in-out 0.5s; }
        .f-5 { width: 14px; height: 14px; top: 50%; left: 10%; animation: fireflyFloat 5s infinite ease-in-out 1.5s; }

        .firefly.popped { transform: scale(0); opacity: 0; transition: 0.4s var(--easing); }

        /* 6. MODAL & INTERACTION */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 8, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--easing);
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: rgba(10, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform: scale(0.95) translateY(30px);
            transition: all 0.5s var(--easing-elastic);
            min-height: 350px; /* Duy trì khung vững chãi */
        }

        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

        .modal-overlay.highlight .modal-box {
            border: 1.5px solid var(--gold-glow);
            box-shadow: 0 0 35px var(--gold-glow), 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Container cho phần text */
        .modal-content-wrapper {
            width: 100%;
            transition: all 0.4s var(--easing);
            opacity: 1;
            text-align: center;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #fff;
        }

        .modal-subtext {
            font-size: 1.05rem;
            color: var(--muted-foreground);
            line-height: 1.5;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* Ẩn text khi ở trạng thái buồn */
        .modal-box.is-sad .modal-content-wrapper {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
            padding: 0;
            pointer-events: none;
        }

        /* Khu vực tương tác */
        .interactive-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            width: 100%;
            margin-top: 10px;
            flex: 1; /* Cho phép chiếm không gian còn lại */
        }

        .yes-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Sticker Styling */
        .sticker-box {
            position: absolute;
            left: -45px;
            top: -10px;
            width: 85px;
            height: auto;
            z-index: 10;
            pointer-events: none;
            transition: all 0.5s var(--easing-elastic);
        }

        /* Sad State: Tách rời sticker đưa sang trái */
        .modal-box.is-sad .sticker-box {
            left: 20px;
            top: 55%;
            transform: translateY(-50%) scale(1.4);
            width: 120px;
        }

        .sticker-box img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .sticker-wiggle {
            animation: stickerIdle 4s infinite ease-in-out;
        }

        @keyframes stickerIdle {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-10px) rotate(4deg); }
        }

        /* Sad State */
        .sad-sticker img {
            filter: grayscale(0.8) brightness(0.85) contrast(1.1) !important;
            animation: tremble 0.2s infinite;
        }

        @keyframes tremble {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1.5px); }
            75% { transform: translateX(1.5px); }
        }

        /* Bóng thoại */
        .speech-bubble {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            display: none;
            z-index: 20;
            animation: bubblePop 0.5s var(--easing-elastic) forwards;
        }

        /* Sad State: Bóng thoại nằm trên sticker đã tách rời */
        .modal-box.is-sad .speech-bubble {
            bottom: 115%;
        }

        .speech-bubble img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .speech-bubble p {
            position: relative;
            font-size: 0.9rem;
            color: #222;
            font-weight: 700;
            padding: 18px 12px 28px 12px;
            text-align: center;
            line-height: 1.3;
        }

        @keyframes bubblePop {
            0% { transform: translateX(-50%) scale(0.5) translateY(30px); opacity: 0; }
            100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; }
        }

        /* Buttons Styling */
        .btn-choice {
            padding: 0.85rem 2.2rem;
            border-radius: 100px;
            border: none;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.5s var(--easing-elastic);
            white-space: nowrap;
        }

        .btn-yes {
            background: var(--gold-solid);
            color: #002b42;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.25);
            padding-left: 3.5rem; /* Padding cho sticker mặc định */
        }

        /* Sad State: Di chuyển nút Ok em vào ĐÚNG GÓC KHOANH TRÒN */
        .modal-box.is-sad .btn-yes {
            position: absolute;
            right: 30px;
            bottom: 30px;
            padding-left: 2.2rem; /* Trở lại padding bình thường */
            transform: scale(1.1);
            z-index: 100;
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .close-modal-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--muted-foreground);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .close-modal-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .animate-reveal { animation: fadeRise 1s var(--easing) forwards; }
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline preload="auto">
            <source src="265731_medium.mp4" type="video/mp4">
        </video>
    </div>

    <div class="bubbles-container">
        <div class="firefly f-1" data-id="1"></div>
        <div class="firefly f-2" data-id="2"></div>
        <div class="firefly f-3" data-id="3"></div>
        <div class="firefly f-4" data-id="4"></div>
        <div class="firefly f-5" data-id="5"></div>
    </div>

    <nav>
        <div class="logo">LoveU</div>
        <a href="#" class="liquid-glass btn-nav trigger-modal">Begin Journey</a>
    </nav>

    <main class="hero">
        <h1 class="animate-reveal">
            everything <em>happens</em> for <br>
            <em>a reason.</em>
        </h1>
    </main>

    <div id="journey-modal" class="modal-overlay">
        <div class="modal-box" id="modal-box">
            <button id="close-modal" class="close-modal-btn">✕</button>
            
            <div class="modal-content-wrapper" id="content-wrapper">
                <h2 class="modal-title">Chương mới</h2>
                <p class="modal-subtext">Mỗi bước chân bạn đi đều dẫn bạn đến gần hơn với nơi bạn thuộc về.</p>
            </div>
            
            <div id="choice-area" class="interactive-area" style="display: none;">
                <!-- Sticker & Bubble -->
                <div id="sticker-container" class="sticker-box sticker-wiggle">
                    <div id="speech-bubble" class="speech-bubble">
                        <img src="Đồng chí Lâm không có giỡn nha!!! (2).png" alt="bubble">
                        <p>Chị định chọn không thật à? 🥺</p>
                    </div>
                    <img id="main-sticker" src="Đồng chí Lâm không có giỡn nha!!!.jpg" alt="sticker">
                </div>

                <!-- Nhóm nút đồng ý -->
                <div class="yes-group" id="yes-group">
                    <button class="btn-choice btn-yes" id="choice-yes">Ok em</button>
                </div>

                <!-- Nút từ chối -->
                <button class="btn-choice btn-no" id="choice-no">Không</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('journey-modal');
            const modalBox = document.getElementById('modal-box');
            const closeBtn = document.getElementById('close-modal');
            const modalTitle = document.querySelector('.modal-title');
            const modalSubtext = document.querySelector('.modal-subtext');
            const triggers = document.querySelectorAll('.trigger-modal');
            
            const stickerContainer = document.getElementById('sticker-container');
            const mainSticker = document.getElementById('main-sticker');
            const speechBubble = document.getElementById('speech-bubble');
            
            const choiceArea = document.getElementById('choice-area');
            const btnNo = document.getElementById('choice-no');
            const btnYes = document.getElementById('choice-yes');
            
            const originalTitle = "Chào chị nhé";
            const originalText = "Đây không phải là phần chính, chạm tay vào các đom đóm để biết thêm chi tiết.";

            const messages = {
                "1": { title: "Duyên phận", text: "Cho em làm quen với chị được không ạ" },
                "2": { title: "Làm quen", text: "Em có thể làm quen với chị được không =)))))" },
                "3": { title: "Kết nối", text: "Chị làm quen với em được không =)))))" },
                "4": { title: "Bắt chuyện", text: "Em nghĩ hoài vẫn không bắt chuyện được, nay đẹp trời chị cho em làm quen được không =))))" },
                "5": { title: "Chào chị", text: "Cho em làm quen nhaaaa" }
            };

            const resetState = () => {
                choiceArea.style.display = 'none';
                speechBubble.style.display = 'none';
                mainSticker.src = "Đồng chí Lâm không có giỡn nha!!!.jpg";
                stickerContainer.classList.remove('sad-sticker');
                stickerContainer.classList.add('sticker-wiggle');
                btnNo.style.display = 'inline-block';
                modalBox.classList.remove('is-sad');
            };

            triggers.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetState();
                    modalTitle.innerText = originalTitle;
                    modalSubtext.innerText = originalText;
                    modal.classList.remove('highlight');
                    modal.classList.add('active');
                });
            });

            document.querySelectorAll('.firefly').forEach(f => {
                f.addEventListener('click', () => {
                    const id = f.getAttribute('data-id');
                    const content = messages[id];
                    f.classList.add('popped');
                    
                    resetState();
                    modalTitle.innerText = content.title;
                    modalSubtext.innerText = content.text;
                    choiceArea.style.display = 'flex'; 
                    modal.classList.add('highlight');
                    
                    setTimeout(() => {
                        modal.classList.add('active');
                    }, 150);

                    setTimeout(() => f.classList.remove('popped'), 8000);
                });
            });

            // Logic khi chọn KHÔNG
            btnNo.addEventListener('click', () => {
                modalBox.classList.add('is-sad');
                mainSticker.src = "Đồng chí Lâm không có giỡn nha!!! (1).jpg";
                stickerContainer.classList.remove('sticker-wiggle');
                stickerContainer.classList.add('sad-sticker');
                speechBubble.style.display = 'block';
                btnNo.style.display = 'none';
            });

            // Logic khi chọn OK EM
            btnYes.addEventListener('click', () => {
                resetState();
                modalTitle.innerText = "Tuyệt vời!";
                modalSubtext.innerText = "Em biết là chị sẽ không nỡ từ chối mà =)))";
                choiceArea.style.display = 'none';
                modal.classList.add('highlight');
            });

            const closeModal = () => modal.classList.remove('active');
            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
        });
    </script>
</body>
</html>
