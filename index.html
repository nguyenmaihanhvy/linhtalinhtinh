<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanhVy | linhtalinhtinh</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CSS VARIABLES - Hệ thống quản lý màu sắc */
        :root {
            --background: #002b42; /* Deep Navy Blue */
            --foreground: #ffffff;
            --muted-foreground: #a1a1aa;
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --liquid-bg: rgba(255, 255, 255, 0.01);
        }

        /* TỐI ƯU UX/UI: Chống phóng to chữ sai lệch trên iOS và bật thao tác chạm mượt */
        html {
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        /* 2. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 3. VIDEO BACKGROUND */
        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-cover: cover;
            object-fit: cover;
        }

        /* TỐI ƯU UX/UI: Thêm lớp phủ mờ nhẹ để chữ trắng luôn nổi bật, dễ đọc bất chấp video phía sau */
        .video-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            pointer-events: none;
        }

        /* 4. NAVIGATION */
        nav {
            position: relative;
            z-index: 10;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.875rem;
            letter-spacing: -0.02em;
        }

        .logo sup {
            font-size: 0.75rem;
            margin-left: 2px;
        }

        .nav-links {
            display: none;
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex;
                gap: 2.5rem;
            }
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.875rem;
            color: var(--muted-foreground);
            transition: color 0.3s ease;
            
            /* TỐI ƯU UX/UI: Tăng vùng chạm tối thiểu cho ngón tay trên mobile */
            min-height: 44px;
            display: inline-flex;
            align-items: center;
        }

        .nav-links a.active {
            color: var(--foreground);
        }

        /* 5. LIQUID GLASS EFFECT (Kỹ thuật cao cấp) */
        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            position: relative;
            cursor: pointer;
            color: var(--foreground);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            
            /* TỐI ƯU UX/UI: Đảm bảo nút đủ lớn để chạm dễ dàng */
            min-height: 44px;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.45) 0%, 
                rgba(255,255,255,0.1) 40%, 
                rgba(255,255,255,0.1) 60%, 
                rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        .btn-nav {
            padding: 0.6rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        .btn-hero {
            padding: 1.25rem 3.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            margin-top: 3rem;
        }

        /* TỐI ƯU UX/UI: Chống lỗi "Sticky Hover" (nút bị kẹt màu khi chạm tay trên điện thoại) */
        @media (hover: hover) {
            .nav-links a:hover {
                color: var(--foreground);
            }
            .liquid-glass:hover {
                transform: scale(1.03);
            }
        }

        /* 6. HERO SECTION */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 1.5rem 10rem;
            min-height: calc(100vh - 100px);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            letter-spacing: -2.46px;
            font-weight: 400;
            max-width: 1200px;
        }

        /* CSS MỚI: Điều chỉnh màu chữ và hiệu ứng phát sáng vàng */
        h1 em {
            font-style: normal;
            color: white; /* Đổi màu chữ sang trắng */
            /* Tạo hiệu ứng phát sáng vàng (Gold glow) bằng nhiều lớp text-shadow */
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.7), /* Lớp sáng vàng gần */
                0 0 20px rgba(255, 215, 0, 0.5), /* Lớp sáng vàng xa hơn chút */
                0 0 30px rgba(255, 215, 0, 0.3); /* Lớp sáng vàng lan tỏa mờ */
        }

        /* 7. ANIMATIONS */
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-1 { animation: fadeRise 0.8s ease-out forwards; }
        .animate-3 { animation: fadeRise 0.8s ease-out 0.4s both; }

        /* TỐI ƯU UX/UI: Căn chỉnh lại nhẹ nhàng cho màn hình Mobile */
        @media (max-width: 768px) {
            h1 {
                letter-spacing: -1px; /* Tránh chữ dính quá sát nhau trên màn hình nhỏ */
            }
            .btn-hero {
                width: 90%; /* Kéo dài nút để ngón tay dễ chạm hơn */
                max-width: 320px;
            }
        }

        /* 8. HIỆU ỨNG TRƯỢT TỪ DƯỚI LÊN (MODAL) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; /* Bo tròn ở các góc */
            padding: 3.5rem 2.5rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            transform: translateY(100vh); /* Đẩy xuống dưới cùng màn hình lúc ban đầu */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0); /* Trượt lên vị trí trung tâm */
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: var(--foreground);
            letter-spacing: -0.02em;
        }

        .modal-subtext {
            font-size: 1.125rem;
            color: var(--muted-foreground);
            line-height: 1.6;
        }

        .close-modal-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--muted-foreground);
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s ease;
            line-height: 1;
        }

        @media (hover: hover) {
            .close-modal-btn:hover {
                color: var(--foreground);
            }
        }

    </style>
</head>
<body>

    <!-- Background Video -->
    <div class="video-container">
        <!-- TỐI ƯU UX/UI: Bổ sung preload="metadata" để load nhanh và mượt hơn -->
        <video autoplay loop muted playsinline preload="metadata">
            <source src="265731_medium.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="logo">LoveU<sup></sup></div>
        
        <div class="nav-links">
            <a href="#" class="active"></a>
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
        </div>

        <!-- Thêm class .trigger-modal để JS nhận diện nút -->
        <a href="#" class="liquid-glass btn-nav trigger-modal">Begin Journey</a>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <h1 class="animate-1">
            everything <em>happens</em> for <br>
            <em>a reason.</em>
        </h1>

        <!-- Thêm class .trigger-modal để JS nhận diện nút -->
        <a href="#" class="liquid-glass btn-hero animate-3 trigger-modal">
            Begin Journey
        </a>
    </main>

    <!-- Modal / Khung trượt từ dưới lên -->
    <div id="journey-modal" class="modal-overlay">
        <div class="modal-box">
            <button id="close-modal" class="close-modal-btn">&times;</button>
            <h2 class="modal-title">Em rất chào chị</h2>
            <p class="modal-subtext">Mỗi một lần chạm sẽ khiến em đỡ đau đầu hơn =)))) Nhờ chị chạm vài lần giúp em nhen </p>
        </div>
    </div>

    <!-- Script điều khiển chức năng đóng/mở Modal -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const triggers = document.querySelectorAll('.trigger-modal');
            const modal = document.getElementById('journey-modal');
            const closeBtn = document.getElementById('close-modal');

            // Mở modal khi bấm vào bất kỳ nút "Begin Journey" nào
            triggers.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault(); // Ngăn trang web nhảy lên đầu trang
                    modal.classList.add('active');
                });
            });

            // Đóng modal khi bấm vào nút "X"
            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            // Đóng modal khi bấm ra ngoài khung (bấm vào vùng nền đen mờ)
            modal.addEventListener('click', (e) => {
                if(e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
