<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanhVy | linhtalinhtinh</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CSS VARIABLES */
        :root {
            --background: #002b42; 
            --foreground: #ffffff;
            --muted-foreground: #a1a1aa;
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --liquid-bg: rgba(255, 255, 255, 0.01);
            --gold-glow: rgba(255, 215, 0, 0.6);
            --gold-solid: #ffd700;
        }

        html, body {
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            height: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. VIDEO BACKGROUND */
        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            pointer-events: none;
        }

        /* 3. NAVIGATION */
        nav {
            position: relative;
            z-index: 50;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.875rem;
            letter-spacing: -0.02em;
        }

        .nav-links { display: none; }
        @media (min-width: 768px) { .nav-links { display: flex; gap: 2.5rem; } }

        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            cursor: pointer;
            color: var(--foreground);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            min-height: 44px;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        .btn-nav { padding: 0.6rem 1.5rem; border-radius: 9999px; font-size: 0.875rem; }

        /* 4. HERO SECTION */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
            min-height: calc(100vh - 100px);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            letter-spacing: -2.46px;
            font-weight: 400;
        }

        h1 em {
            font-style: normal;
            color: white;
            text-shadow: 0 0 10px var(--gold-glow), 0 0 25px rgba(255, 215, 0, 0.3);
        }

        /* 5. FIREFLIES */
        .bubbles-container {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }

        .firefly {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at center, #fff 0%, var(--gold-glow) 50%, transparent 80%);
            filter: blur(2px); 
            box-shadow: 0 0 15px var(--gold-glow);
            pointer-events: auto;
            cursor: pointer;
            will-change: transform, opacity;
        }

        .firefly::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: transparent;
        }

        @keyframes fireflyFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate(-10px, -20px) scale(1.1); opacity: 1; }
        }

        .f-1 { width: 15px; height: 15px; top: 15%; left: 15%; animation: fireflyFloat 6s infinite ease-in-out; }
        .f-2 { width: 22px; height: 22px; top: 65%; left: 25%; animation: fireflyFloat 8s infinite ease-in-out 1s; }
        .f-3 { width: 12px; height: 12px; top: 30%; left: 75%; animation: fireflyFloat 7s infinite ease-in-out 2s; }
        .f-4 { width: 18px; height: 18px; top: 75%; left: 80%; animation: fireflyFloat 9s infinite ease-in-out 0.5s; }
        .f-5 { width: 14px; height: 14px; top: 50%; left: 10%; animation: fireflyFloat 5s infinite ease-in-out 1.5s; }

        .firefly.popped { transform: scale(0); opacity: 0; transition: 0.4s; }

        /* 6. MODAL & CHOICES */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: rgba(10, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3.5rem 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            transform: scale(0.9) translateY(40px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

        .modal-overlay.highlight .modal-box {
            border: 1.5px solid var(--gold-glow);
            box-shadow: 0 0 30px var(--gold-glow), 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #fff;
        }

        .modal-subtext {
            font-size: 1.125rem;
            color: var(--muted-foreground);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Choice Buttons */
        .choice-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-choice {
            padding: 0.8rem 2rem;
            border-radius: 100px;
            border: none;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-yes {
            background: var(--gold-solid);
            color: #002b42;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-choice:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        /* Falling & Breaking Animation */
        @keyframes fallAndBreak {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(400px) rotate(45deg); opacity: 0; }
        }

        .falling {
            animation: fallAndBreak 0.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
            pointer-events: none;
        }

        .follow-up-box {
            display: none;
            background: var(--gold-glow);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 16px;
            font-size: 0.95rem;
            margin-top: 1rem;
            animation: fadeIn 0.5s ease-out forwards;
            border: 1px dashed rgba(255,255,255,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--muted-foreground);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .animate-1 { animation: fadeRise 0.8s ease-out forwards; }
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline preload="metadata">
            <source src="265731_medium.mp4" type="video/mp4">
        </video>
    </div>

    <div class="bubbles-container">
        <div class="firefly f-1" data-id="1"></div>
        <div class="firefly f-2" data-id="2"></div>
        <div class="firefly f-3" data-id="3"></div>
        <div class="firefly f-4" data-id="4"></div>
        <div class="firefly f-5" data-id="5"></div>
    </div>

    <nav>
        <div class="logo">LoveU</div>
        <a href="#" class="liquid-glass btn-nav trigger-modal">Begin Journey</a>
    </nav>

    <main class="hero">
        <h1 class="animate-1">
            everything <em>happens</em> for <br>
            <em>a reason.</em>
        </h1>
    </main>

    <div id="journey-modal" class="modal-overlay">
        <div class="modal-box">
            <button id="close-modal" class="close-modal-btn">✕</button>
            <h2 class="modal-title">A New Chapter</h2>
            <p class="modal-subtext">Every step you take leads you closer to where you are meant to be.</p>
            
            <div id="choice-area" class="choice-container" style="display: none;">
                <button class="btn-choice btn-yes" id="choice-yes">Ok em</button>
                <button class="btn-choice btn-no" id="choice-no">Không</button>
            </div>
            
            <div id="follow-up" class="follow-up-box">
                Chị định chọn không thật ạ? 🥺
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('journey-modal');
            const closeBtn = document.getElementById('close-modal');
            const modalTitle = document.querySelector('.modal-title');
            const modalSubtext = document.querySelector('.modal-subtext');
            const triggers = document.querySelectorAll('.trigger-modal');
            
            const choiceArea = document.getElementById('choice-area');
            const btnNo = document.getElementById('choice-no');
            const btnYes = document.getElementById('choice-yes');
            const followUp = document.getElementById('follow-up');
            
            const originalTitle = "Chào chị nhé";
            const originalText = "Đây không phải là phần chính, chạm tay vào các đom đóm để biết thêm chi tiết.";

            const messages = {
                "1": { title: "", text: "Cho em làm quen với chị được không ạ" },
                "2": { title: "", text: "Em có thể làm quen với chị được không =)))))" },
                "3": { title: "", text: "Chị làm quen với em được không =)))))" },
                "4": { title: "", text: "Em nghĩ hoài vẫn không bắt chuyện được, nay đẹp trời chị cho em làm quen được không =))))" },
                "5": { title: "", text: "Cho em làm quen nhaaaa" }
            };

            const resetChoices = () => {
                choiceArea.style.display = 'none';
                followUp.style.display = 'none';
                btnNo.classList.remove('falling');
                btnNo.style.display = 'inline-block';
            };

            // Mở modal thông thường (Begin Journey)
            triggers.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetChoices();
                    modalTitle.innerText = originalTitle;
                    modalSubtext.innerText = originalText;
                    modal.classList.remove('highlight');
                    modal.classList.add('active');
                });
            });

            // Xử lý khi bấm đom đóm
            document.querySelectorAll('.firefly').forEach(f => {
                f.addEventListener('click', () => {
                    const id = f.getAttribute('data-id');
                    const content = messages[id];

                    f.classList.add('popped');
                    
                    resetChoices();
                    modalTitle.innerText = content.title;
                    modalSubtext.innerText = content.text;
                    choiceArea.style.display = 'flex'; // Hiện nút lựa chọn
                    modal.classList.add('highlight');
                    
                    setTimeout(() => {
                        modal.classList.add('active');
                    }, 200);

                    setTimeout(() => f.classList.remove('popped'), 8000);
                });
            });

            // Logic cho nút "Không"
            btnNo.addEventListener('click', () => {
                btnNo.classList.add('falling');
                setTimeout(() => {
                    btnNo.style.display = 'none';
                    followUp.style.display = 'block';
                }, 600); // Đợi rơi gần hết mới hiện text mới
            });

            // Logic cho nút "Ok em"
            btnYes.addEventListener('click', () => {
                modalTitle.innerText = "Tuyệt vời!";
                modalSubtext.innerText = "Thật không để em còn đi khoe =)))";
                choiceArea.style.display = 'none';
            });

            const closeModal = () => modal.classList.remove('active');
            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
        });
    </script>
</body>
</html>
