<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HanhVy | linhtalinhtinh</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap&subset=vietnamese" rel="stylesheet">
    
    <!-- Thư viện Pháo hoa (Confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 1. CSS VARIABLES */
        :root {
            --background: #002b42; 
            --foreground: #ffffff;
            --muted-foreground: #a1a1aa;
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --liquid-bg: rgba(255, 255, 255, 0.01);
            --gold-glow: rgba(255, 215, 0, 0.6);
            --gold-solid: #ffd700;
            --pink-glow: rgba(255, 183, 197, 0.8); /* Thêm màu hồng hoa anh đào */
            --easing: cubic-bezier(0.23, 1, 0.32, 1);
        }

        html, body {
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            height: 100%;
            background-color: var(--background);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--foreground);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. VIDEO BACKGROUND - Thêm Fallback gradient nếu video tải chậm */
        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #001f30 0%, #003a5c 100%);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            will-change: transform;
            opacity: 0.9; /* Làm tối video một chút để chữ nổi hơn */
        }

        .video-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* 3. NAVIGATION */
        nav {
            position: relative;
            z-index: 50;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.875rem;
            letter-spacing: -0.02em;
        }

        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            cursor: pointer;
            color: var(--foreground);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            min-height: 44px;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        .btn-nav { 
            padding: 0.6rem 1.5rem; 
            border-radius: 9999px; 
            font-size: 0.875rem; 
            animation: pulseBtn 2s infinite; 
        }

        /* Thêm nhịp đập cho nút bấm thu hút hơn trên Mobile */
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* 4. HERO SECTION */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
            min-height: calc(100vh - 100px);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            letter-spacing: -2.46px;
            font-weight: 400;
        }

        h1 em {
            font-style: normal;
            color: white;
            /* Đổi màu phát sáng thành hồng nhạt hoa anh đào */
            text-shadow: 0 0 10px var(--pink-glow), 0 0 20px rgba(255, 183, 197, 0.5), 0 0 40px rgba(255, 183, 197, 0.3);
        }

        /* 5. FIREFLIES */
        .bubbles-container {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }

        .firefly {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at center, #fff 0%, var(--gold-glow) 50%, transparent 80%);
            filter: blur(2px); 
            box-shadow: 0 0 15px var(--gold-glow);
            pointer-events: auto;
            cursor: pointer;
            will-change: transform, opacity;
        }

        .firefly::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: transparent;
        }

        @keyframes fireflyFloat {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate3d(-10px, -20px, 0) scale(1.1); opacity: 1; }
        }

        .f-1 { width: 15px; height: 15px; top: 15%; left: 15%; animation: fireflyFloat 6s infinite ease-in-out; }
        .f-2 { width: 22px; height: 22px; top: 65%; left: 25%; animation: fireflyFloat 8s infinite ease-in-out 1s; }
        .f-3 { width: 12px; height: 12px; top: 30%; left: 75%; animation: fireflyFloat 7s infinite ease-in-out 2s; }
        .f-4 { width: 18px; height: 18px; top: 75%; left: 80%; animation: fireflyFloat 9s infinite ease-in-out 0.5s; }
        .f-5 { width: 14px; height: 14px; top: 50%; left: 10%; animation: fireflyFloat 5s infinite ease-in-out 1.5s; }

        .firefly.popped { transform: scale(0); opacity: 0; transition: 0.4s var(--easing); }

        /* 6. MODAL & CHOICES */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--easing);
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: rgba(10, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: clamp(2rem, 5vw, 3.5rem) clamp(1.2rem, 4vw, 2.5rem); /* Tối ưu padding cho mobile */
            max-width: 450px;
            width: 90%;
            max-height: 85vh; /* Tránh tràn màn hình dọc */
            overflow-y: auto; /* Cho phép cuộn nếu nội dung dài */
            text-align: center;
            transform: scale(0.95) translateY(40px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            /* Ẩn thanh cuộn để giữ giao diện clean */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }

        .modal-box::-webkit-scrollbar {
            display: none;
        }

        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

        .modal-overlay.highlight .modal-box {
            border: 1.5px solid var(--gold-glow);
            box-shadow: 0 0 30px var(--gold-glow), 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 8vw, 3.5rem); /* Chữ nhỏ lại vừa vặn trên điện thoại */
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #fff;
        }

        .modal-subtext {
            font-size: clamp(0.95rem, 4vw, 1.125rem); /* Responsive text */
            color: var(--muted-foreground);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* STICKER ANIMATION */
        .cute-sticker {
            width: 380px; /* Phóng to sticker */
            max-width: 100%;
            height: auto;
            max-height: 220px; /* Tăng giới hạn chiều cao */
            object-fit: contain;
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 12px;
            /* Kết hợp nhảy lên (popIn) và lắc lư liên tục (stickerWobble) sau 0.6s */
            animation: 
                popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                stickerWobble 2s ease-in-out infinite 0.6s;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animation lắc lư nhẹ nhàng */
        @keyframes stickerWobble {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-5deg) scale(1.02); }
            75% { transform: rotate(5deg) scale(1.02); }
        }

        /* Choice Buttons */
        .choice-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-choice {
            padding: 0.8rem 2rem;
            border-radius: 100px;
            border: none;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, filter 0.3s;
            position: relative;
            will-change: transform;
            text-decoration: none;
            display: inline-block;
        }

        .btn-yes {
            background: var(--gold-solid);
            color: #002b42;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            z-index: 2;
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        /* Nút nhắn tin xuất hiện sau khi đồng ý */
        .btn-action {
            background: #fff;
            color: #002b42;
            margin-top: 1.5rem;
            animation: fadeIn 0.8s var(--easing) forwards;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .btn-choice:hover {
            transform: translateY(-3px) scale(1.05);
            filter: brightness(1.1);
        }

        /* Animation rơi vỡ */
        @keyframes fallAndBreak {
            0% { transform: translate3d(0, 0, 0) rotate(0); opacity: 1; }
            100% { transform: translate3d(0, 400px, 0) rotate(45deg); opacity: 0; }
        }

        .falling {
            animation: fallAndBreak 0.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards !important;
            pointer-events: none;
        }

        .follow-up-box {
            display: none;
            background: var(--gold-glow);
            color: #002b42;
            padding: 0.8rem 1.5rem;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 1.5rem;
            animation: fadeIn 0.5s var(--easing) forwards;
            border: 1px dashed rgba(255,255,255,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--muted-foreground);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close-modal-btn:hover {
            color: #fff;
        }

        .animate-1 { animation: fadeRise 0.8s var(--easing) forwards; }
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Thay mp4 của bạn vào src, mình thêm poster mờ để lót nền -->
    <div class="video-container">
        <video autoplay loop muted playsinline preload="metadata" poster="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2094&auto=format&fit=crop">
            <source src="270434_medium.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Audio ngầm định -->
    <!-- Thay đổi "ten-file-nhac-cua-ban.mp3" thành tên file nhạc thực tế của bạn -->
    <audio id="bg-music" loop preload="auto">
        <source src="noname.mp3" type="audio/mpeg">
    </audio>

    <div class="bubbles-container">
        <div class="firefly f-1" data-id="1"></div>
        <div class="firefly f-2" data-id="2"></div>
        <div class="firefly f-3" data-id="3"></div>
        <div class="firefly f-4" data-id="4"></div>
        <div class="firefly f-5" data-id="5"></div>
    </div>

    <nav>
        <div class="logo">NMHanhVy</div>
        <a href="#" class="liquid-glass btn-nav trigger-modal">Begin Journey</a>
    </nav>

    <main class="hero">
        <h1 class="animate-1">
            everything <em>happens</em> for <br>
            <em>a reason.</em>
        </h1>
    </main>

    <div id="journey-modal" class="modal-overlay">
        <div class="modal-box">
            <button id="close-modal" class="close-modal-btn">✕</button>
            <h2 class="modal-title">A New Chapter</h2>
            <div class="modal-subtext" id="modal-desc">Every step you take leads you closer to where you are meant to be.</div>
            
            <div id="choice-area" class="choice-container" style="display: none;">
                <button class="btn-choice btn-yes" id="choice-yes">Ok em</button>
                <button class="btn-choice btn-no" id="choice-no">Không</button>
            </div>
            
            <div id="follow-up" class="follow-up-box">
                Chị định chọn không thật ạ? 🥺
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('journey-modal');
            const closeBtn = document.getElementById('close-modal');
            const modalTitle = document.querySelector('.modal-title');
            const modalSubtext = document.getElementById('modal-desc');
            const triggers = document.querySelectorAll('.trigger-modal');
            
            const choiceArea = document.getElementById('choice-area');
            const btnNo = document.getElementById('choice-no');
            const btnYes = document.getElementById('choice-yes');
            const followUp = document.getElementById('follow-up');
            
            const bgMusic = document.getElementById('bg-music');
            let isMusicPlaying = false;
            
            // Biến đếm số lần nút Không "né"
            let noEvadeCount = 0;
            const MAX_EVADE = 5; 

            const originalTitle = "Em rất chào chị ạ!";
            const originalText = "Đây không phải là phần chính, chị bắt mấy con đom đóm để biết thêm chi tiết nha =))))";

            const messages = {
                "1": { title: "🌟", text: "Chị cho phép em làm quen với chị nhaa" },
                "2": { title: "👉👈", text: "Em có thể làm quen với chị được không ạ =))" },
                "3": { title: "👋", text: "Em xin phép được làm quen với chị ạ" },
                "4": { title: "💪", text: "Em nghĩ hoài vẫn không bắt chuyện được, nay đẹp trời chị cho em làm quen được không =))))" },
                "5": { title: "🥺", text: "Cho em làm quen chị nhaaaa" }
            };

            const resetChoices = () => {
                choiceArea.style.display = 'none';
                followUp.style.display = 'none';
                btnNo.classList.remove('falling');
                btnNo.style.display = 'inline-block';
                btnNo.style.transform = 'translate(0, 0)';
                noEvadeCount = 0; // Reset lại số lần né
            };

            // Hàm phát nhạc
            const playMusic = () => {
                if (!isMusicPlaying) {
                    bgMusic.volume = 0.5; // Đặt âm lượng 50%
                    bgMusic.play().catch(e => console.log("Trình duyệt chặn autoplay âm thanh."));
                    isMusicPlaying = true;
                }
            };

            // Mở modal thông thường (Begin Journey)
            triggers.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    playMusic(); // Phát nhạc khi có tương tác đầu tiên
                    resetChoices();
                    modalTitle.innerText = originalTitle;
                    modalSubtext.innerHTML = originalText;
                    modal.classList.remove('highlight');
                    modal.classList.add('active');
                });
            });

            // Xử lý khi bấm đom đóm
            document.querySelectorAll('.firefly').forEach(f => {
                f.addEventListener('click', () => {
                    playMusic(); // Đảm bảo nhạc phát
                    
                    const id = f.getAttribute('data-id');
                    const content = messages[id];

                    f.classList.add('popped');
                    
                    resetChoices();
                    modalTitle.innerText = content.title;
                    modalSubtext.innerText = content.text;
                    choiceArea.style.display = 'flex'; 
                    modal.classList.add('highlight');
                    
                    setTimeout(() => {
                        modal.classList.add('active');
                    }, 200);

                    setTimeout(() => f.classList.remove('popped'), 8000);
                });
            });

            // Logic "Né tránh" cho nút Không (Hỗ trợ cả chuột và màn hình cảm ứng)
            const evadeLogic = (e) => {
                if (noEvadeCount < MAX_EVADE) {
                    e.preventDefault(); // Chặn click
                    
                    // Lấy kích thước màn hình để giới hạn khoảng cách nhảy, tránh văng ra khỏi màn hình Mobile
                    const isMobile = window.innerWidth < 450;
                    const maxMoveX = isMobile ? 80 : 160;
                    const maxMoveY = isMobile ? 60 : 100;
                    
                    // Tạo tọa độ ngẫu nhiên
                    const x = (Math.random() - 0.5) * maxMoveX;
                    const y = (Math.random() - 0.5) * maxMoveY - (isMobile ? 10 : 30);
                    
                    btnNo.style.transform = `translate(${x}px, ${y}px)`;
                    noEvadeCount++;
                }
            };

            btnNo.addEventListener('mouseenter', evadeLogic);
            btnNo.addEventListener('touchstart', evadeLogic);

            // Khi đã né đủ số lần, cho phép click để rơi xuống
            btnNo.addEventListener('click', () => {
                if (noEvadeCount >= MAX_EVADE) {
                    btnNo.classList.add('falling');
                    setTimeout(() => {
                        btnNo.style.display = 'none';
                        followUp.style.display = 'block';
                    }, 600);
                }
            });

            // Logic cho nút "Ok em" (Bắn pháo hoa + Hiện nút nhắn tin + STICKER)
            btnYes.addEventListener('click', () => {
                followUp.style.display = 'none';
                choiceArea.style.display = 'none';
                
                modalTitle.innerText = "";
                
                // Ở ĐÂY: Thêm Sticker Lay EXO và lời nhắn
                modalSubtext.innerHTML = `
                    <img src="Đồng chí Lâm không có giỡn nha!!!.png" alt="Lay EXO Sticker" class="cute-sticker">
                    Thật không để em còn đi khoe =)))<br>
                    <a href="https://www.facebook.com/concuatrenbo" class="btn-choice btn-action">
                        FB của em nè =))))
                    </a>
                `;

                // Hiệu ứng pháo hoa bằng canvas-confetti
                var duration = 3 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

                function randomInRange(min, max) {
                  return Math.random() * (max - min) + min;
                }

                var interval = setInterval(function() {
                  var timeLeft = animationEnd - Date.now();

                  if (timeLeft <= 0) {
                    return clearInterval(interval);
                  }

                  var particleCount = 50 * (timeLeft / duration);
                  // Bắn từ 2 bên mép màn hình
                  confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                  confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }, 250);
            });

            const closeModal = () => modal.classList.remove('active');
            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
        });
    </script>
</body>
</html>
